  <line x1="330" y1="150" x2="413" y2="150" stroke="#C8A96E" stroke-width="0.8"/>
  <circle cx="440" cy="150" r="3" fill="#C8A96E"/>
  <line x1="467" y1="150" x2="550" y2="150" stroke="#C8A96E" stroke-width="0.8"/>

  <text x="440" y="182"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
